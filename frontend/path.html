<!-- ================= YOUR ORIGINAL JS (UNCHANGED) ================= -->
<script>
/* ✅ YOUR ENTIRE PATH ALGORITHM CODE REMAINS EXACTLY SAME */
/* (No logic modified — only UI balanced) */

const canvas=document.getElementById("grid");
const ctx=canvas.getContext("2d");

const GRID=40;
const CELL=canvas.width/GRID;

let grid=[];
let robot={x:2,y:2};
let goal={x:35,y:35};
let path=[];
let animationIndex=0;

function initGrid(){
grid=[];
for(let i=0;i<GRID;i++){
grid[i]=[];
for(let j=0;j<GRID;j++) grid[i][j]=0;
}
}

function convert(lat,lon){
const originLat=32.40;
const originLon=-41.25;
const scale=200;

let x=Math.floor((lon-originLon)*scale+GRID/2);
let y=Math.floor((lat-originLat)*scale+GRID/2);

return{
x:Math.max(1,Math.min(GRID-2,x)),
y:Math.max(1,Math.min(GRID-2,y))
};
}

/* ---- Remaining A* code unchanged ---- */

function heuristic(a,b){
return Math.abs(a.x-b.x)+Math.abs(a.y-b.y);
}

function getNeighbors(node){
const dirs=[
{x:1,y:0},{x:-1,y:0},
{x:0,y:1},{x:0,y:-1},
{x:1,y:1},{x:-1,y:-1},
{x:1,y:-1},{x:-1,y:1}
];

let neighbors=[];
dirs.forEach(d=>{
let nx=node.x+d.x;
let ny=node.y+d.y;
if(nx>=0&&nx<GRID&&ny>=0&&ny<GRID)
neighbors.push({x:nx,y:ny});
});
return neighbors;
}

function aStar(start,goal){
let open=[start];
let cameFrom={},gScore={},fScore={};

gScore[`${start.x},${start.y}`]=0;
fScore[`${start.x},${start.y}`]=heuristic(start,goal);

while(open.length){
open.sort((a,b)=>fScore[`${a.x},${a.y}`]-fScore[`${b.x},${b.y}`]);
let current=open.shift();

if(current.x===goal.x&&current.y===goal.y){
let total=[current];
while(`${current.x},${current.y}` in cameFrom){
current=cameFrom[`${current.x},${current.y}`];
total.unshift(current);
}
return total;
}

getNeighbors(current).forEach(n=>{
let cost=(n.x!==current.x&&n.y!==current.y)?1.4:1;
let tentative=gScore[`${current.x},${current.y}`]+cost;
let key=`${n.x},${n.y}`;

if(!(key in gScore)||tentative<gScore[key]){
cameFrom[key]=current;
gScore[key]=tentative;
fScore[key]=tentative+heuristic(n,goal);
if(!open.find(o=>o.x===n.x&&o.y===n.y))
open.push(n);
}
});
}
return[];
}

function generatePath(){
initGrid();

robot=convert(
parseFloat(startLat.value),
parseFloat(startLon.value)
);

goal=convert(
parseFloat(goalLat.value),
parseFloat(goalLon.value)
);

path=aStar(robot,goal);
animationIndex=0;
draw();
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let x=0;x<GRID;x++){
for(let y=0;y<GRID;y++){
ctx.fillStyle="#0b2a3a";
ctx.fillRect(x*CELL,y*CELL,CELL,CELL);
ctx.strokeStyle="rgba(0,255,255,0.03)";
ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
}
}

ctx.strokeStyle="#00ff88";
ctx.lineWidth=2;
ctx.beginPath();

if(path.length)
ctx.moveTo(path[0].x*CELL+CELL/2,path[0].y*CELL+CELL/2);

for(let i=1;i<animationIndex;i++)
ctx.lineTo(path[i].x*CELL+CELL/2,path[i].y*CELL+CELL/2);

ctx.stroke();

ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(robot.x*CELL+CELL/2,robot.y*CELL+CELL/2,5,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(goal.x*CELL+CELL/2,goal.y*CELL+CELL/2,6,0,Math.PI*2);
ctx.fill();
}

function simulate(){
if(!path.length){
status.innerText="Generate Path First";
return;
}

animationIndex=0;

(function animate(){
if(animationIndex<path.length){
robot=path[animationIndex++];
draw();
setTimeout(animate,20);
}else{
status.innerText="Destination Reached";
}
})();
}

function resetPath(){
animationIndex=0;
draw();
}

initGrid();
draw();
</script>
