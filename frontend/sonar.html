<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SONAR DISPLAY</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:Orbitron;
background:#06121a;
}

.gridbg{
background-image:
linear-gradient(rgba(0,229,255,.06) 1px,transparent 1px),
linear-gradient(90deg,rgba(0,229,255,.06) 1px,transparent 1px);
background-size:40px 40px;
}

.glass{
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
}

.glow{
box-shadow:0 0 25px rgba(0,229,255,.25);
}
</style>
</head>

<body class="gridbg text-cyan-200">

<div class="max-w-5xl mx-auto p-8 space-y-6">

<!-- HEADER -->
<h1 class="text-center text-2xl text-cyan-300 tracking-widest">
SONAR DISPLAY
</h1>

<!-- RADAR -->
<div class="glass glow rounded-3xl p-8 flex justify-center">

<canvas id="radar" width="420" height="420"></canvas>

</div>

<!-- FILTER TABS -->
<div class="flex justify-center gap-6 text-sm">

<button class="tab text-cyan-300" data-filter="ALL">ALL</button>
<button class="tab" data-filter="FRIENDLY">FRIENDLY (<span id="cF">0</span>)</button>
<button class="tab" data-filter="UNKNOWN">UNKNOWN (<span id="cU">0</span>)</button>
<button class="tab" data-filter="THREAT">THREAT (<span id="cT">0</span>)</button>
<button class="tab" data-filter="OBSTACLE">OBSTACLE (<span id="cO">0</span>)</button>

</div>

<!-- CONTACT LIST -->
<div id="list" class="space-y-4"></div>

</div>

<script src="sonar.js"></script>
</body>
</html>
